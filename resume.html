        <form class="row g-3">
            <div class="col-md-6 formText">
                <label for="firstName" class="form-label">First Name*</label>
                <input type="text" class="form-control" id="firstName" placeholder="Enter your first name"required>
            </div>
            <div class="col-md-6 formText">
                <label for="lastName" class="form-label">Last Name*</label>
                <input type="text" class="form-control" id="lastName" placeholder="Enter your last name"required>
            </div>
            <div class="col-md-8 formText">
                <label for="emailInfo" class="form-label">E-mail*</label>
                <input type="email" class="form-control" id="emailInfo" placeholder="Enter your email"required>
            </div>
            <div class="col-md-4 formText">
                <label for="phoneNumber" class="form-label">Phone Number (Optional)</label>
                <input type="text" class="form-control" id="phoneNumber" placeholder="+1 (415) 123-4567">
            </div>
            <div class="col-md-12 formText">
                <label for="comments" class="form-label">Message*</label>
                <textarea class="form-control" id="comments" rows="3" placeholder="Write your message..." required></textarea>
            </div>
            <div class="col-md-12 formText">
                <button type="submit" class="btn btnSubmit">Submit</button>
            </div>
        </form>
